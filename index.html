  .cat-2 { background: #e0e6f0; color: #2a3d5e; } .cat-2.active { background: var(--indigo); color: white; }

  .cat-5 { background: #e8e0f0; color: #3a2a6a; } .cat-5.active { background: #7a6aaa; color: white; }

  .cat-7 { background: #f0e8d8; color: #5a3e1a; } .cat-7.active { background: #a07840; color: white; }

  .card.color-6::before { background: linear-gradient(90deg, #3a8a72, #6abaa4); }

  .favs-section { margin-top: 46px; border-top: 1px solid rgba(90,74,64,0.11); padding-top: 32px; }
  .favs-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--ink); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .fav-item { background: var(--warm); border-radius: 12px; padding: 13px 16px; margin-bottom: 8px; font-size: 0.87rem; color: var(--ink); line-height: 1.5; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; animation: cardIn 0.3s ease; }
  .fav-remove { background: none; border: none; cursor: pointer; color: var(--ink-soft); opacity: 0.38; font-size: 0.95rem; flex-shrink: 0; transition: opacity 0.2s; }
  .fav-remove:hover { opacity: 0.75; }
  .fav-cat { font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; opacity: 0.48; margin-bottom: 3px; }
  .footer-hearts { text-align: center; margin-top: 48px; font-size: 1rem; color: var(--terracotta); opacity: 0.25; letter-spacing: 8px; }
  @media (max-width: 480px) { .card { padding: 26px 22px; } .btn-main { padding: 13px 26px; } }
</style>
</head>

      { text: "Devine la chanson fredonnée", sub: "Sans paroles, juste fredonner. L'autre a 30 secondes. Tour par tour. Comptez les points." },
      { text: "Le journal de notre couple", sub: "Inventez les titres du journal de votre semaine. Rédaction libre, humour bienvenu." },
      { text: "Défi d'écriture collaborative", sub: "En 15 minutes, écrivez ensemble le premier paragraphe d'un conte qui commence par 'Ce soir-là à Paris...'." },
      { text: "Le jeu du détective", sub: "L'un choisit un souvenir commun et donne des indices. L'autre devine de quel moment il s'agit." },
      { text: "Origami pour deux", sub: "Trouvez un tutoriel d'origami simple sur YouTube. Faites-le ensemble. Celui qui finit en premier choisit le dessert." },
      { text: "Inventez un cocktail ensemble", sub: "Avec ce que vous avez à la maison. Donnez-lui un nom. Goûtez-le. Notez-le sur 10." },
      { text: "Karaoké en duo", sub: "Choisissez une chanson à chanter à deux. Répétez 5 minutes. Représentation obligatoire." },
      { text: "Le défi du compliment physique", sub: "Chacun doit dire 5 choses qu'il aime physiquement chez l'autre — avec des détails, pas de raccourcis." },
      { text: "Mots enchaînés thématiques", sub: "Seulement des mots liés à votre histoire. Le premier qui ne trouve rien a perdu." },
      { text: "Le menu de notre mariage imaginaire", sub: "Si vous vous mariiez aujourd'hui, quel serait le menu ? La musique ? Le lieu ? Concevez-le en 20 minutes." },
      { text: "Défi : une journée sans se plaindre", sub: "Toute la journée. Si l'un se plaint, l'autre le note. Celui qui a le moins de points choisit le programme du week-end." },
    ]
  },
  {
    id: 2, label: "🏙️ Sorties & Aventures", short: "Sortie",
    items: [
      { text: "Paris mode touristes", sub: "Visitez un quartier comme si c'était la première fois. Montmartre, le Marais, Belleville... Prenez des photos comme des étrangers." },
      { text: "Restaurant tiré au sort", sub: "Ouvrez Google Maps, fermez les yeux, posez le doigt. Vous allez dans ce resto ce soir." },
      { text: "Bus ou métro sans destination", sub: "Prenez la première ligne qui passe. Descendez quand ça vous plaît. Marchez. Rentrez autrement." },
      { text: "Week-end à Amsterdam", sub: "Canaux, vélos, musées, fromage. 1h d'avion ou quelques heures de train selon d'où vous partez." },
      { text: "Route des vins de Bourgogne ou d'Alsace", sub: "Une journée, deux domaines maximum, pique-nique entre les deux." },
      { text: "Randonnée + pique-nique", sub: "Un sac, du bon pain, du fromage, une bouteille. Une montée selon votre niveau. Les Vosges, le Jura, les Alpes." },
      { text: "Escape game ensemble", sub: "Excellent pour la complicité et les fous rires garantis. Choisissez un thème qui vous attire." },
      { text: "Cours de cuisine ensemble", sub: "Un atelier dans votre ville. Cuisine française, japonaise, italienne... Ce qui compte c'est le 'faire ensemble'." },
      { text: "Ciné en plein air l'été", sub: "Guettez la programmation estivale. Apportez une couverture et des snacks maison." },
      { text: "Visite de musée + dîner thématique", sub: "Choisissez un resto en lien avec l'expo que vous venez de voir." },
      { text: "Week-end à Lisbonne", sub: "Trams, pasteis de nata, fado, bord de mer. Un des week-ends les plus romantiques d'Europe." },
      { text: "Atelier céramique", sub: "Cherchez un cours de poterie. Créer quelque chose ensemble de ses mains — expérience rare et mémorable." },
      { text: "Soirée jazz live", sub: "Un club de jazz, un concert intimiste. Quelque chose que vous n'auriez peut-être pas choisi seul(e)." },
      { text: "Balade nocturne dans votre ville", sub: "Après 22h, les villes changent. Allez là où vous n'allez jamais normalement." },
      { text: "Pique-nique dans un parc un dimanche matin", sub: "Croissants, café thermos, journal. Pas de téléphone pendant 1h." },
      { text: "Week-end à Barcelone", sub: "Gaudi, la Barceloneta, les tapas, la vie nocturne. 2h d'avion. À réserver." },
      { text: "Road trip d'une journée sans GPS", sub: "Direction vaguement 'nord' ou 'sud'. On s'arrête quand quelque chose nous attire. Retour avant minuit." },
      { text: "Observation des étoiles", sub: "Loin des lumières de la ville, une nuit de nouvelle lune. Une couverture, une appli astronomie, et le silence." },
      { text: "Cours de danse", sub: "Salsa, tango, bachata, rock — peu importe. Une initiation. Vous pouvez être nuls : c'est le but." },
      { text: "Marché de producteurs + cuisine improvisée", sub: "Allez au marché ensemble le matin. Achetez ce qui vous attire. Rentrez et cuisinez sans recette." },
      { text: "Journée spa ou balnéo", sub: "Déconnexion totale. Cherchez un spa ou un centre de balnéothérapie près de chez vous." },
      { text: "Aller voir un spectacle vivant", sub: "Concert, théâtre, comédie, opéra — le style importe peu. L'essentiel : quelque chose que vous n'auriez pas choisi seul(e)." },
      { text: "Visite d'un village inconnu", sub: "Prenez la carte, fermez les yeux, pointez. Allez-y sans rien réserver. Déjeuner sur place." },
      { text: "Week-end à la mer hors saison", sub: "En automne ou hiver, la mer est différente. Plus sauvage, plus vraie. Normands, Bretons ou Basques." },
      { text: "Une journée sans téléphone", sub: "Sortez où vous voulez — mais les téléphones restent à la maison. Vous verrez la différence." },
      { text: "Après-midi brocante + cuisine créative", sub: "Chacun choisit un objet pour l'autre pour moins de 5€. Ensuite, verre et explication de vos choix." },
      { text: "Week-end à Édimbourg", sub: "Le château, le whisky, les Highlands proches, l'accent. Une ville qui n'oublie pas." },
      { text: "Randonnée nocturne", sub: "Un sentier court et sécurisé au crépuscule. Lampes frontales, thermos, silence. Le monde change après la tombée du jour." },
      { text: "Visite d'une expo et dîner pour en parler", sub: "La règle : au dîner, on ne parle que de ce qu'on vient de voir. Vos interprétations seront différentes — c'est le plus beau." },
      { text: "Un concert d'un artiste que l'un de vous adore et que l'autre ne connaît pas", sub: "Celui qui connaît prépare l'autre. Celui qui découvre garde l'esprit ouvert." },
      { text: "Week-end en Bretagne", sub: "Crêpes, galettes, cidre, côtes sauvages. Un incontournable qui ne déçoit jamais." },
      { text: "Journée vélo le long d'une rivière ou d'un canal", sub: "Louez des vélos si besoin. Pédalez sans objectif. Pique-nique en bord d'eau." },
      { text: "Atelier peinture ou dessin", sub: "Cours collectif pour débutants. Pas besoin d'être doués — c'est l'intention qui compte." },
      { text: "Week-end à Rome", sub: "La Fontaine de Trevi, le Trastevere, les gelati. Deux jours suffisent pour tomber amoureux de la ville." },
      { text: "Un dimanche au marché aux puces + verre au soleil", sub: "Flânez, négociez, trouvez des trésors improbables. Finissez en terrasse." },
    ]
  },
  {
    id: 3, label: "✨ Rituels du quotidien", short: "Rituel",
    items: [
      { text: "Le message inattendu", sub: "Un SMS en pleine journée, sans raison. Pas d'occasion. Juste parce que." },
      { text: "Le meilleur moment du jour", sub: "Chaque soir au dîner : chacun dit son meilleur moment de la journée. Règle : le 'bof' est interdit." },
      { text: "La surprise mensuelle", sub: "Chacun organise quelque chose à tour de rôle. Budget libre. L'autre ne sait pas quoi, ni quand. Ce mois-ci : à qui le tour ?" },
      { text: "Notre chanson du mois", sub: "On choisit un morceau qui représente cette période. On l'écoute ensemble. On l'ajoute à une playlist 'Nous'." },
      { text: "Le câlin de 20 secondes", sub: "Ça paraît bête. Ce n'est pas bête. L'ocytocine a besoin de 20 secondes minimum pour se déclencher. Chaque jour." },
      { text: "Café du dimanche matin", sub: "Rien d'autre. Pas de téléphone, pas de liste de courses. Juste le café et vous deux." },
      { text: "Le compliment du lundi", sub: "Chaque lundi, avant de partir : un vrai compliment. Pas 't'es beau/belle' — quelque chose de précis." },
      { text: "La note cachée", sub: "Glissez un post-it dans le sac, la poche, le livre — là où l'autre le trouvera par surprise." },
      { text: "Le dîner sans écran", sub: "Une fois par semaine. Téléphones retournés. Pas de télé. Juste vous deux et la conversation." },
      { text: "Le bilan du mois", sub: "Le dernier dimanche du mois : 10 minutes. Ce qu'on a aimé, ce qu'on a moins aimé, ce qu'on veut vivre le mois prochain." },
      { text: "La promenade du soir", sub: "20 minutes après le dîner, à pied, ensemble. Sans destination. Règle : pas de sujets 'logistiques'." },
      { text: "Le film de la semaine", sub: "Alternez : une semaine tu choisis, une semaine c'est lui/elle. Pas le droit de critiquer le choix de l'autre." },
      { text: "L'objet souvenir", sub: "Ramenez quelque chose de chaque sortie — un ticket, une photo, un caillou. Mettez-le dans une boîte commune." },
      { text: "La note de remerciement", sub: "Une fois par mois, écrivez à l'autre (sur papier) quelque chose qu'il/elle a fait et que vous n'avez pas assez remercié." },
      { text: "La playlist 'Nous'", sub: "Créez une playlist Spotify commune. Chacun ajoute un morceau par semaine. Écoutez-la ensemble le week-end." },
      { text: "Le rituel du coucher", sub: "Avant d'éteindre : une chose bonne de la journée, un geste tendre. Pas de téléphone pendant 15 minutes minimum." },
      { text: "La photo du week-end", sub: "Chaque week-end, une seule photo que vous aimez tous les deux. Une par mois à imprimer." },
      { text: "Le réveil doux", sub: "Une fois par semaine, celui qui se réveille le premier prépare le café et le laisse prêt pour l'autre." },
      { text: "La question du matin", sub: "Chaque matin, l'un pose à l'autre une question inattendue. Elle peut être absurde ou profonde." },
      { text: "Le geste du mardi", sub: "Choisissez un jour fixe dans la semaine pour un petit geste spécial. Rien de coûteux — juste de l'intention." },
      { text: "Le mot du jour", sub: "Chacun choisit un mot qui décrit comment il se sent ce jour-là. Sans explication obligatoire." },
      { text: "L'étreinte du retour", sub: "Quand l'un rentre à la maison, tout s'arrête — téléphone compris — et on se serre vraiment. Sans se presser." },
      { text: "Le carnet de nous", sub: "Un carnet physique où vous notez des citations, des moments, des idées, des bêtises. Sans règles ni structure." },
      { text: "Le dîner du mercredi", sub: "Un jour fixe par semaine : dîner un peu spécial, même si c'est une omelette. Le secret, c'est l'intention." },
      { text: "Le 'je pense à toi' de midi", sub: "À l'heure du déjeuner, un message court. Pas 'on mange quoi ce soir' — quelque chose de vrai. Un souvenir, une image, une phrase." },
      { text: "Le rituel du dimanche libre", sub: "Un dimanche par mois, sans plan. Vous vous réveillez et décidez au moment. Aucun agenda, aucune obligation." },
      { text: "La chanson du réveil", sub: "Choisissez ensemble une chanson à mettre le samedi matin pendant le petit-déjeuner. Changez-la chaque mois." },
      { text: "La carte des rêves", sub: "Affichez une carte du monde quelque part chez vous. Ajoutez une épingle pour chaque endroit que vous voulez visiter ensemble." },
      { text: "Le livre partagé", sub: "Chacun recommande un livre à l'autre par trimestre. Vous le lisez à votre rythme et en parlez quand c'est fini." },
      { text: "La photo de l'anniversaire", sub: "À chaque date importante : la même photo, au même endroit. Année après année." },
      { text: "Le rituel de la pleine lune", sub: "Une fois par mois, sortez la voir ensemble même 10 minutes. Avec un verre ou sans." },
      { text: "Le 'merci du jour'", sub: "Avant de dormir : un merci précis. Pas un merci générique — quelque chose que l'autre a fait aujourd'hui." },
      { text: "Le menu surprise mensuel", sub: "Une fois par mois, l'un cuisine quelque chose que l'autre n'attend pas. Sans indices. L'autre met la table sans savoir ce qui arrive." },
      { text: "L'album de l'année", sub: "En décembre, imprimez les meilleures photos de l'année et rangez-les dans un album physique. Une tradition qui dure." },
    ]
  },
  {
    id: 4, label: "💑 Complicité & Tendresse", short: "Tendresse",
    items: [
      { text: "Massages échangés", sub: "20 minutes chacun. Musique douce, pas de téléphone. C'est autant donner que recevoir." },
      { text: "Soirée 'premier rendez-vous'", sub: "Comportez-vous comme si vous vous rencontriez pour la première fois. Mettez-vous sur votre 31. Allez dans un endroit où vous n'allez jamais." },
      { text: "Danser dans le salon", sub: "Sans raison. Mettez votre chanson préférée et dansez comme si personne ne regardait." },
      { text: "Lire ensemble", sub: "Choisissez un livre à lire à voix haute, un chapitre chacun. Un roman, une nouvelle, peu importe." },
      { text: "Regarder de vieilles photos ensemble", sub: "Sans objectif. Juste ouvrir l'album et laisser les souvenirs revenir." },
      { text: "Cuisiner ensemble un plat ambitieux", sub: "Un plat que vous n'avez jamais fait. Pas de pression sur le résultat. L'essentiel est le processus." },
      { text: "Nuit sans réveil", sub: "Éteignez les alarmes. Dormez jusqu'à ce que vous vous réveilliez naturellement. Petit-déjeuner au lit si possible." },
      { text: "Lettres à lire dans 5 ans", sub: "Chacun écrit une lettre à l'autre. On les scelle. On les range. On se promet de les lire ensemble dans 5 ans." },
      { text: "Retourner sur un lieu chargé de souvenirs", sub: "Le lieu d'un premier rendez-vous, d'un voyage, d'un moment fort. Allez-y ensemble. Parlez de ce que vous ressentez." },
      { text: "Soirée pyjama sans plan", sub: "Restez chez vous, commandez à manger, mettez des pyjamas, regardez ce que vous voulez. Zéro pression." },
      { text: "Bain ou douche ensemble", sub: "Avec des bougies si vous voulez. L'eau chaude détend, dénoue, rapproche." },
      { text: "Petit-déjeuner au lit un dimanche", sub: "Préparez-le à tour de rôle. L'autre reste sous la couette jusqu'à ce que tout soit prêt." },
      { text: "Se dire 3 choses qu'on admire chez l'autre — maintenant", sub: "Pas dans 10 ans. Maintenant. À voix haute. En se regardant dans les yeux." },
      { text: "Soirée vieux films", sub: "Des films d'avant votre rencontre. Ceux qui ont compté pour chacun. L'autre découvre une part de qui vous étiez." },
      { text: "Se prendre en photo ensemble comme autrefois", sub: "Retrouvez la première photo que vous avez ensemble. Reproduisez-la exactement aujourd'hui. Même pose, même cadrage." },
      { text: "Écouter un album en entier, en silence", sub: "Allongés, sans rien faire d'autre. Laisser la musique remplir l'espace." },
      { text: "Se raconter son rêve de la nuit", sub: "Avec tous les détails, même si c'est absurde. L'autre écoute sans couper et l'interprète librement." },
      { text: "Une après-midi de rien", sub: "Sans plan, sans film choisi à l'avance, sans téléphone. Juste être là. Voir ce qui émerge." },
      { text: "Vous écrire une carte postale", sub: "Même si vous êtes dans la même ville. Une vraie carte, avec un timbre, envoyée par la poste. Le plaisir de la recevoir." },
      { text: "Préparer ensemble le petit-déjeuner idéal", sub: "Pas celui de tous les jours — le petit-déjeuner de votre vie. Avec de la patience et sans se presser." },
      { text: "Se regarder dans les yeux pendant 2 minutes", sub: "Sans parler. Sans rire (essayez). C'est inconfortable les 30 premières secondes. Ensuite quelque chose change." },
      { text: "Se raconter le meilleur jour de sa vie", sub: "Pas forcément ensemble. Le meilleur jour que chacun se rappelle. Avec des détails. L'autre écoute." },
      { text: "Faire une sieste ensemble un dimanche", sub: "Sans alarme. Sans culpabilité. Juste le plaisir de s'endormir avec l'autre à côté." },
      { text: "Choisir ensemble une œuvre pour chez vous", sub: "Une affiche, une photo imprimée, quelque chose de brocante. Quelque chose qui vous représente tous les deux." },
      { text: "Se confier une peur qu'on n'a jamais dite", sub: "Pas la peur des araignées. Une vraie. L'autre écoute sans minimiser." },
      { text: "Voir le lever du soleil ensemble", sub: "Mettez le réveil avant l'aube un week-end. Un café, une couverture, et le ciel qui change de couleur." },
      { text: "Écrire ensemble votre liste 'on ne s'ennuiera jamais si...'", sub: "Des choses qui vous font toujours sourire. À garder sous la main pour les jours gris." },
      { text: "Partager un écouteur", sub: "La même chanson, un écouteur chacun. Marchez ou restez immobiles. Laissez la musique vous connecter." },
      { text: "Se faire un cadeau fait main", sub: "Sans dépenser d'argent. Quelque chose de créé : un dessin, une note, une sélection de citations, une recette écrite à la main." },
      { text: "Se raconter ce qui vous faisait peur enfant", sub: "Les peurs d'enfance révèlent beaucoup. L'autre écoute et reconnaît l'enfant que vous étiez." },
      { text: "Préparer le bain de l'autre", sub: "Température parfaite, bougies, musique douce. L'autre n'a qu'à entrer et se laisser aller." },
      { text: "Lire de la poésie à voix haute", sub: "Un poème chacun. En français, en anglais, ou dans la langue que vous voulez. Pas besoin de tout comprendre." },
      { text: "Se raconter ce qui vous rendait heureux à 15 ans", sub: "Qu'est-ce qui reste de ça ? Qu'est-ce qui a changé ? Qu'est-ce qui vous manque ?" },
      { text: "Une nuit sans télé ni écrans", sub: "Conversation, jeux, musique, lecture. Redécouvrir comment on passe le temps sans écrans." },
    ]
  },
  {
    id: 5, label: "🚀 Projets & Rêves", short: "Projet",
    items: [
      { text: "La 'Bucket List' à deux", sub: "Chacun écrit 10 choses à faire avant d'avoir 70 ans. On met tout en commun. On choisit 5 communes. On les planifie vraiment." },
      { text: "Destination rêvée — planifiez-la", sub: "Pas 'on aimerait aller au Japon un jour'. Ouvrez Skyscanner ce soir et choisissez une date. Le reste vient après." },
      { text: "Apprendre quelque chose ensemble", sub: "Une langue, un instrument, un art, un sport. Quelque chose que ni l'un ni l'autre ne sait faire. Cours collectifs de préférence." },
      { text: "Projet maison ou déco", sub: "Choisissez une pièce à transformer ensemble. Une vision, pas un chantier. Pinterest, brocante, peinture." },
      { text: "Voyager 'off the beaten path'", sub: "Un pays que ni l'un ni l'autre n'a visité. Pas le plus évident. Géorgie, Islande, Maroc intérieur, Albanie, Portugal rural." },
      { text: "Créer quelque chose ensemble", sub: "Un potager, un album photo imprimé, une recette de famille, une vidéo souvenir. Quelque chose qui reste." },
      { text: "Un défi sportif commun", sub: "Inscrivez-vous à quelque chose ensemble : randonnée longue, vélo, natation... Avec une date. L'engagement rend les choses réelles." },
      { text: "Imaginez votre retraite idéale", sub: "Où ? Comment ? Quoi faire de vos journées ? Soyez précis et rêvez grand. C'est un exercice de connaissance mutuelle." },
      { text: "Le projet 'une ville par an'", sub: "Chaque année, une ville que vous n'avez jamais visitée ensemble. Vous alternez pour choisir. Quelle est la prochaine ?" },
      { text: "Créez un rituel annuel", sub: "Un week-end, un endroit, une date. Chaque année. Comme une ancre. Où ce serait ?" },
      { text: "Le dîner de gala chez vous", sub: "Organisez un vrai dîner gastronomique à la maison — menu, accord mets-vins, présentation soignée, tenue de circonstance. Juste pour vous deux." },
      { text: "Imaginez votre vie dans 15 ans", sub: "Où vous vivez ? Qu'est-ce que vous faites ? Comment se passent vos journées ? Est-ce que vous y êtes proches ?" },
      { text: "Un projet artistique ou créatif", sub: "Peindre ensemble, écrire quelque chose, faire de la photo. Pas besoin d'être doués. C'est l'intention et le partage qui comptent." },
      { text: "Dessinez votre maison idéale", sub: "Sur papier ou sur Pinterest. Sans limite de budget. Où est-elle ? Comment est-elle ? Qu'est-ce qu'elle a de spécial ?" },
      { text: "Écrivez le scénario de votre vieillesse parfaite", sub: "Comment sont vos journées à 80 ans ? Où vous vivez ? Qu'est-ce que vous faites ? Soyez précis et optimistes." },
      { text: "Un projet de langues ensemble", sub: "Une langue que ni l'un ni l'autre ne parle ? Italien, portugais, japonais... 10 minutes par jour pendant un mois." },
      { text: "Planifiez un voyage d'anniversaire spécial", sub: "Pas le prochain — un dans 3 ans. Pour une date importante. Rêvez en grand." },
      { text: "Créez un fonds 'aventure'", sub: "Une tirelire physique ou un compte à part. Chaque semaine, ce que vous pouvez. Sans destination fixe pour l'instant." },
      { text: "Planifiez un bénévolat ensemble", sub: "Un week-end, une cause qui vous importe à tous les deux. Quelque chose de concret, de réel." },
      { text: "Écrivez les règles de votre couple", sub: "Les vôtres. Pas celles des livres — celles que vous avez apprises ensemble. Mettez-les sur papier." },
      { text: "Un projet photo annuel", sub: "Un thème pour l'année. 'Portes de Paris', 'ombres', 'mains'. Une photo par semaine. Album à la fin de l'année." },
      { text: "Planifiez une expérience gastronomique unique", sub: "Un restaurant étoilé, un dîner dans le noir, un repas les yeux bandés. Quelque chose que vous n'avez jamais fait." },
      { text: "Créez votre tradition de Noël à vous", sub: "Pas celle des familles — la vôtre. Un rituel, un plat, un geste qui n'appartient qu'à vous deux." },
      { text: "Planifiez d'apprendre à vraiment danser ensemble", sub: "Pas un seul cours — une vraie formation. Dans un an, vous dansez quelque chose de reconnaissable." },
      { text: "Écrivez votre mission en tant que couple", sub: "Comme une entreprise — mais avec du cœur. Quelle est votre raison d'être ensemble ? Vos valeurs ?" },
      { text: "Un projet de bien-être partagé", sub: "Yoga, méditation, natation, étirements. Quelque chose que vous faites ensemble régulièrement pour prendre soin de vous." },
      { text: "Créez un jardin ou un potager à la maison", sub: "Même en pots sur le balcon. Quelque chose que vous cultivez ensemble et qui grandit avec vous." },
      { text: "Planifiez une semaine de déconnexion numérique", sub: "Sans réseaux sociaux, sans séries, sans info. Qu'est-ce que vous feriez de ce temps ?" },
      { text: "Écrivez une lettre au couple que vous serez dans 10 ans", sub: "Qu'est-ce que vous vous souhaitez ? Qu'espérez-vous avoir vécu ? Scellez-la et gardez-la." },
      { text: "Un projet musical ensemble", sub: "Apprendre à jouer quelque chose — même une seule chanson simple à la guitare. Ou créer une playlist qui raconte votre futur." },
      { text: "Planifiez une retraite de couple", sub: "Un week-end sans téléphone, sans agenda, dans un endroit tranquille. Juste vous deux et le temps." },
      { text: "Dessinez votre arbre généalogique commun", sub: "Mêlez vos deux familles. Cherchez les histoires derrière les noms. Qu'est-ce que vous avez hérité ?" },

// State
let currentCat = null;
let currentCard = null;
let usedIndices = {};
let favorites = JSON.parse(localStorage.getItem('nolwenn_jonas_favs') || '[]');

function createHearts() {
  const container = document.getElementById('heartsbg');
  const symbols = ['♥', '♡', '❤', '♥', '♡'];
  for (let i = 0; i < 12; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = symbols[i % symbols.length];
    h.style.left = (5 + Math.random() * 90) + '%';
    h.style.fontSize = (0.7 + Math.random() * 0.9) + 'rem';
    h.style.color = Math.random() > 0.5 ? '#c4714a' : '#d4908a';
    h.style.animationDuration = (18 + Math.random() * 22) + 's';
    h.style.animationDelay = (Math.random() * 20) + 's';
    container.appendChild(h);
  }
}
createHearts();

const catContainer = document.getElementById('categories');
CATEGORIES.forEach((cat, i) => {
  const btn = document.createElement('button');
  btn.className = `cat-btn cat-${i}`;
  btn.textContent = cat.label;
  btn.onclick = () => selectCategory(i);
  catContainer.appendChild(btn);
});

function selectCategory(id) {
  currentCat = id;
  if (!usedIndices[id]) usedIndices[id] = [];
  document.querySelectorAll('.cat-btn').forEach((b, i) => b.classList.toggle('active', i === id));
  updateProgressBar();
  draw();
}

function randomCategory() {
  selectCategory(Math.floor(Math.random() * CATEGORIES.length));
}

function updateProgressBar() {
  if (currentCat === null) return;
  const cat = CATEGORIES[currentCat];
  const seen = (usedIndices[currentCat] || []);
  document.getElementById('progressBar').style.display = 'flex';
  document.getElementById('progressLabel').textContent = `${seen.length} carte${seen.length > 1 ? 's' : ''} vue${seen.length > 1 ? 's' : ''} sur ${cat.items.length}`;
  document.getElementById('progressDots').innerHTML = cat.items.map((_, i) => {
    const s = seen.includes(i);
    if ((i + 1) % 5 === 0) return `<span class="dot heart">${s ? '♥' : '♡'}</span>`;
    return `<span class="dot ${s ? 'seen' : ''}"></span>`;
  }).join('');
}

function draw() {
  if (currentCat === null) { randomCategory(); return; }
  const cat = CATEGORIES[currentCat];
  let pool = cat.items.map((_, i) => i).filter(i => !(usedIndices[currentCat] || []).includes(i));
  if (pool.length === 0) { usedIndices[currentCat] = []; pool = cat.items.map((_, i) => i); }
  const idx = pool[Math.floor(Math.random() * pool.length)];
  if (!usedIndices[currentCat]) usedIndices[currentCat] = [];
  usedIndices[currentCat].push(idx);
  currentCard = { catId: currentCat, itemIdx: idx };
  const item = cat.items[idx];
  document.getElementById('cardArea').innerHTML = `
    <div class="card color-${currentCat}">
      <div class="card-tag">${cat.short}</div>
      <p class="card-text">${item.text}</p>
      ${item.sub ? `<p class="card-sub">${item.sub}</p>` : ''}
      <div class="card-counter">${usedIndices[currentCat].length}/${cat.items.length}</div>
    </div>`;
  document.getElementById('btnFav').style.display = 'inline-block';
  updateProgressBar();
  updateStats();
}

function saveFav() {
  if (!currentCard) return;
  const cat = CATEGORIES[currentCard.catId];
  const item = cat.items[currentCard.itemIdx];
  const fav = { catLabel: cat.short, text: item.text };
  if (!favorites.some(f => f.text === fav.text)) {
    favorites.push(fav);
    localStorage.setItem('nolwenn_jonas_favs', JSON.stringify(favorites));
    renderFavs();
    const btn = document.getElementById('btnFav');
    btn.textContent = '♥ Gardé !';
    btn.style.borderColor = 'var(--terracotta)';
    btn.style.color = 'var(--terracotta)';
    setTimeout(() => { btn.textContent = '♡ Garder'; btn.style.borderColor = ''; btn.style.color = ''; }, 1600);
  }
}

function removeFav(idx) {
  favorites.splice(idx, 1);
  localStorage.setItem('nolwenn_jonas_favs', JSON.stringify(favorites));
  renderFavs();
}

function renderFavs() {
  const section = document.getElementById('favsSection');
  const list = document.getElementById('favsList');
  if (favorites.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = favorites.map((f, i) => `
    <div class="fav-item">
      <div><div class="fav-cat">${f.catLabel}</div><div>${f.text}</div></div>
      <button class="fav-remove" onclick="removeFav(${i})">✕</button>
    </div>`).join('');
}

function resetCurrent() {
  if (currentCat === null) return;
  usedIndices[currentCat] = [];
  updateProgressBar();
  updateStats();
  const btn = document.getElementById('btnReset');
  btn.textContent = '✓ Fait !';
  setTimeout(() => { btn.textContent = '↺ Réinitialiser'; }, 1400);
  document.getElementById('cardArea').innerHTML = `<div class="empty"><span class="empty-icon">♡</span><p class="empty-text">Catégorie réinitialisée</p><p class="empty-sub">Tirez une nouvelle carte !</p></div>`;
  document.getElementById('btnFav').style.display = 'none';
}

function updateStats() {
  const total = CATEGORIES.reduce((s, c) => s + c.items.length, 0);
  const used = Object.values(usedIndices).reduce((s, arr) => s + arr.length, 0);
  document.getElementById('stats').textContent = `${used} carte${used > 1 ? 's' : ''} vue${used > 1 ? 's' : ''} sur ${total} au total`;
}

if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw-fr.js").catch(() => {}); }

renderFavs();
updateStats();
</script>
